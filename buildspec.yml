version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8

  pre_build:
    commands:
      - echo "Starting build for commit $CODEBUILD_RESOLVED_SOURCE_VERSION"

  build:
    commands:
      - mvn package

  post_build:
    commands:
      - chmod +x deploy.sh
      - ./deploy.sh

artifacts:
  files:
    - '**/*'